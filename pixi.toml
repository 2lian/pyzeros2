[workspace]
authors = ["Neppel Elian <elian.neppel@posteo.eu>"]
channels = [ "https://prefix.dev/conda-forge"]
name = "PyZeROS2"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
main = "python -m pyzeros.example"
demo = "python -m pyzeros.demo"

[feature.jazzy.tasks]
publish = "ros2 topic pub '/chatter' std_msgs/msg/String '{data: 'Hello_World'}'"
router = "RUST_LOG=debug ros2 run rmw_zenoh_cpp rmw_zenohd"

### Global Tools ####
[dependencies]
python = ">=3.12.13,<3.14" # maturing doesn't like free-threaded capable python 3.14
rust = ">=1.94.0,<1.95"
maturin = ">=1.12.6,<2"
uv = ">=0.10.10,<0.11"
colorama = ">=0.4.6,<0.5"

[environments]
default = {features = ["pyproject"]}
ros = { features = ["jazzy"] }

### Python Project ####
[feature.pyproject.dependencies]

[feature.pyproject.pypi-dependencies]
# cyclonedds = ">=0.10.5, <0.11"
eclipse-zenoh = ">=1.8.0, <2"
asyncio_for_robotics = ">=1.3.5, <2"
pyzeros = {path = ".", editable = true}
ros_z_msgs_py = {path = "ros-z/crates/ros-z-msgs/python/", editable = true}
ros_z_py = {path = "ros-z/crates/ros-z-py/", editable = true}

### ROS 2 Jazzy ####
[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
lark-parser = ">=0.12.0,<0.13"
ros-jazzy-ros-core = ">=0.11.0,<0.12"
ros-jazzy-ros2cli = ">=0.32.8,<0.33"
ros-jazzy-rmw-zenoh-cpp = ">=0.2.9,<0.3"

[activation.env]
RMW_IMPLEMENTATION="rmw_zenoh_cpp"
ROS_DOMAIN_ID="0"
ROS_AUTOMATIC_DISCOVERY_RANGE="LOCALHOST"
ZENOH_ROUTER_CONFIG_URI="./router.json5"
ZENOH_SESSION_CONFIG_URI="./client.json5"
ROS_LOCALHOST_ONLY=""
PYTHON_GIL="1"
